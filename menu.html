<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafe Bakı — Menyu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f4ef;min-height:100vh;color:#1a1a1a}

/* ── HEADER ── */
.hero{background:#1a1205;color:#fff;padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-inner{position:relative;max-width:520px;margin:0 auto}
.rest-logo{width:72px;height:72px;border-radius:50%;background:rgba(201,168,76,0.2);border:2px solid rgba(201,168,76,0.4);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;overflow:hidden}
.rest-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:0.02em;margin-bottom:4px}
.hero p{font-size:13px;opacity:0.6;margin-bottom:16px}
.hero-meta{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.hero-meta span{font-size:12px;opacity:0.75;display:flex;align-items:center;gap:5px}
.gold{color:#c9a84c}

/* ── CATEGORIES ── */
.sticky-cats{position:sticky;top:0;z-index:10;background:#f7f4ef;padding:12px 16px;border-bottom:1px solid #e8e2d9}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:7px 18px;border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid #d5cfc6;background:#fff;color:#666;transition:all 0.2s;white-space:nowrap}
.cat-btn:hover{border-color:#c9a84c;color:#8a6a1f}
.cat-btn.active{background:#1a1205;color:#c9a84c;border-color:#1a1205}

/* ── SECTION ── */
.section-wrap{max-width:540px;margin:0 auto;padding:0 14px}
.section-head{display:flex;align-items:center;gap:10px;padding:20px 0 10px}
.section-head h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:500}
.section-line{flex:1;height:1px;background:#e0d8cd}

/* ── ITEM CARD ── */
.items{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.item{background:#fff;border:1px solid #ece7de;border-radius:16px;display:flex;align-items:center;gap:12px;padding:12px;transition:all 0.15s;cursor:default}
.item:hover{border-color:#c9a84c;box-shadow:0 2px 12px rgba(201,168,76,0.12)}
.item-img{width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0;background:#f0ebe0}
.item-img-placeholder{width:64px;height:64px;border-radius:12px;background:#f0ebe0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-desc{font-size:12px;color:#888;line-height:1.4}
.item-right{text-align:right;flex-shrink:0}
.item-price{font-size:15px;font-weight:500;color:#1a1205}
.badge{font-size:10px;padding:2px 8px;border-radius:6px;margin-bottom:5px;display:inline-block;font-weight:500}
.badge-new{background:#e8f5e9;color:#2e7d32}
.badge-pop{background:#fff8e1;color:#e65100}
.badge-hot{background:#fce4ec;color:#c62828}

/* ── DIVIDER ── */
.divider{height:1px;background:#e8e2d9;margin:8px 0 4px}

/* ── QR SECTION ── */
.qr-section{max-width:540px;margin:28px auto 20px;padding:0 14px}
.qr-card{background:#1a1205;color:#fff;border-radius:20px;padding:24px;text-align:center}
.qr-card h3{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:4px;color:#c9a84c}
.qr-card p{font-size:12px;opacity:0.6;margin-bottom:18px}
.qr-wrap{display:inline-block;padding:14px;background:#fff;border-radius:14px}
.qr-url{font-size:11px;color:rgba(255,255,255,0.5);margin-top:12px;font-family:monospace}
.copy-btn{margin-top:10px;font-size:12px;padding:8px 20px;border-radius:8px;border:1px solid rgba(201,168,76,0.5);background:transparent;color:#c9a84c;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.copy-btn:hover{background:rgba(201,168,76,0.15)}

/* ── ADMIN PANEL ── */
.admin-toggle{max-width:540px;margin:0 auto;padding:0 14px 12px;display:flex;gap:8px}
.admin-toggle button{flex:1;padding:9px;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid #d5cfc6;background:#fff;color:#555;transition:all 0.2s}
.admin-toggle .primary-btn{background:#1a1205;color:#c9a84c;border-color:#1a1205}

.admin-panel{display:none;max-width:540px;margin:0 auto 80px;padding:0 14px}
.admin-panel.open{display:block}
.admin-card{background:#fff;border:1px solid #ece7de;border-radius:16px;padding:20px}
.admin-card h3{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:16px;color:#1a1205}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid #e0d8cd;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fafaf8;color:#1a1205;outline:none;transition:border 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#c9a84c}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-upload-area{border:2px dashed #d5cfc6;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafaf8}
.img-upload-area:hover{border-color:#c9a84c;background:#fffdf5}
.img-upload-area p{font-size:13px;color:#aaa;margin-top:6px}
.img-preview{width:80px;height:80px;border-radius:10px;object-fit:cover;margin-top:8px;display:none}
.save-btn{width:100%;padding:12px;border-radius:12px;background:#1a1205;color:#c9a84c;border:none;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:4px;transition:all 0.2s;letter-spacing:0.03em}
.save-btn:hover{background:#2a1f08}

/* ── LOGO UPLOAD (hero) ── */
.logo-edit{position:absolute;bottom:2px;right:2px;width:20px;height:20px;background:#c9a84c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1205;color:#c9a84c;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;background:#fff;border-top:1px solid #ece7de;padding:10px 14px;display:flex;gap:8px}
.bottom-bar button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid #d5cfc6;background:#fff;color:#555;transition:all 0.2s}
.bottom-bar .primary-btn{background:#1a1205;color:#c9a84c;border-color:#1a1205}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div style="position:relative;display:inline-block">
      <div class="rest-logo" id="rest-logo-wrap">
        <span id="logo-emoji">🍽</span>
        <img id="logo-img" src="" alt="" style="display:none">
      </div>
      <div class="logo-edit" title="Logo dəyiş" onclick="document.getElementById('logo-file').click()">✎</div>
      <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="changeLogo(this)">
    </div>
    <h1 id="rest-name-display">Kafe Bakı</h1>
    <p id="rest-addr-display">Bakı, Nizami küçəsi 45</p>
    <div class="hero-meta">
      <span>🕐 <span id="rest-hours-display">09:00 – 23:00</span></span>
      <span>📞 <span id="rest-phone-display">+994 50 123 45 67</span></span>
    </div>
  </div>
</div>

<!-- CATEGORIES -->
<div class="sticky-cats">
  <div class="cat-scroll" id="cat-bar">
    <button class="cat-btn active" onclick="filter('all',this)">Hamısı</button>
    <button class="cat-btn" onclick="filter('sehər',this)">🌅 Səhər yeməyi</button>
    <button class="cat-btn" onclick="filter('soupSalad',this)">🥗 Şorba & Salat</button>
    <button class="cat-btn" onclick="filter('əsas',this)">🍖 Əsas yeməklər</button>
    <button class="cat-btn" onclick="filter('içki',this)">☕ İçkilər</button>
    <button class="cat-btn" onclick="filter('desert',this)">🍰 Desertlər</button>
  </div>
</div>

<!-- MENU -->
<div id="menu-root"></div>

<!-- QR -->
<div class="qr-section">
  <div class="qr-card">
    <h3>Menyunun QR kodu</h3>
    <p>Masaya yapışdırın — müştərilər telefon ilə oxusun</p>
    <div class="qr-wrap"><div id="qr-box"></div></div>
    <div class="qr-url" id="qr-url-text">cafe-baki.netlify.app</div>
    <button class="copy-btn" onclick="copyLink()">Linki kopyala</button>
  </div>
</div>

<!-- ADMIN TOGGLE -->
<div class="admin-toggle">
  <button onclick="toggleAdmin()">⚙ Admin panel</button>
  <button class="primary-btn" onclick="window.print()">🖨 Çap et</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-card">
    <h3>Restoran məlumatları</h3>
    <div class="form-row">
      <div class="form-group"><label>Rəstoran adı</label><input id="r-name" value="Kafe Bakı" oninput="updateHero()"></div>
      <div class="form-group"><label>Telefon</label><input id="r-phone" value="+994 50 123 45 67" oninput="updateHero()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Ünvan</label><input id="r-addr" value="Bakı, Nizami küçəsi 45" oninput="updateHero()"></div>
      <div class="form-group"><label>İş saatları</label><input id="r-hours" value="09:00 – 23:00" oninput="updateHero()"></div>
    </div>
  </div>

  <div class="admin-card" style="margin-top:12px">
    <h3>Yeni yemək əlavə et</h3>
    <div class="form-row">
      <div class="form-group"><label>Ad</label><input id="f-name" placeholder="Lülə kebab"></div>
      <div class="form-group"><label>Qiymət (₼)</label><input id="f-price" type="number" placeholder="14" min="0" step="0.5"></div>
    </div>
    <div class="form-group"><label>Təsvir</label><textarea id="f-desc" placeholder="Qoyun ətindən, lavаş ilə"></textarea></div>
    <div class="form-row">
      <div class="form-group">
        <label>Kateqoriya</label>
        <select id="f-cat">
          <option value="sehər">🌅 Səhər yeməyi</option>
          <option value="soupSalad">🥗 Şorba & Salat</option>
          <option value="əsas" selected>🍖 Əsas yeməklər</option>
          <option value="içki">☕ İçkilər</option>
          <option value="desert">🍰 Desertlər</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nişan</label>
        <select id="f-badge">
          <option value="">Yoxdur</option>
          <option value="new">🟢 Yeni</option>
          <option value="pop">🟠 Populyar</option>
          <option value="hot">🔴 İsti xüsusi</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Şəkil (isteğe bağlı)</label>
      <div class="img-upload-area" onclick="document.getElementById('f-img').click()">
        <div style="font-size:28px">📷</div>
        <p>Şəkil seçmək üçün klikləyin</p>
        <img id="img-preview" class="img-preview">
      </div>
      <input type="file" id="f-img" accept="image/*" style="display:none" onchange="previewImg(this)">
    </div>
    <button class="save-btn" onclick="addItem()">+ Yemək əlavə et</button>
  </div>

  <div class="admin-card" style="margin-top:12px">
    <h3>Mövcud yeməklər</h3>
    <div id="edit-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="bottom-bar">
  <button onclick="toggleAdmin()">⚙ Redaktə et</button>
  <button class="primary-btn" onclick="showToast('Sayta yükləmək üçün faylı yükləyin →')">🚀 Netlifyə yüklə</button>
</div>

<script>
// ── DATA ──
let menuData = [
  // Səhər yeməyi
  {id:1,cat:'sehər',emoji:'🥚',name:'Klassik səhər dəsti',desc:'Yumurta, pendir, sosis, çay daxil',price:8,badge:'pop',img:''},
  {id:2,cat:'sehər',emoji:'🥞',name:'Pancake dəsti',desc:'Bal və təzə meyvə ilə',price:6,badge:'',img:''},
  {id:3,cat:'sehər',emoji:'🧀',name:'Pendir lavaşı',desc:'Qızardılmış lavaş içi pendirli',price:5,badge:'',img:''},
  {id:4,cat:'sehər',emoji:'🍳',name:'Omlet',desc:'Göyərti, pomidor, biber ilə',price:6.5,badge:'new',img:''},
  {id:5,cat:'sehər',emoji:'🫖',name:'Çay dəsti',desc:'Demlikcə çay + üç növ qənnadı',price:4,badge:'',img:''},
  // Şorba & Salat
  {id:6,cat:'soupSalad',emoji:'🍲',name:'Piti',desc:'Ənənəvi Azərbaycan şorbası, lovya ilə',price:12,badge:'pop',img:''},
  {id:7,cat:'soupSalad',emoji:'🥣',name:'Düyü şorbası',desc:'Toyuq bulyonu, düyü, göyərti',price:8,badge:'',img:''},
  {id:8,cat:'soupSalad',emoji:'🥗',name:'Çoban salatı',desc:'Pomidor, xiyar, soğan, zeytun yağı',price:6,badge:'',img:''},
  {id:9,cat:'soupSalad',emoji:'🥬',name:'Cəzər salatı',desc:'Kəsmik sousu ilə',price:7,badge:'new',img:''},
  // Əsas yeməklər
  {id:10,cat:'əsas',emoji:'🍗',name:'Toyuq şiş kebab',desc:'Lavаş, soğan, göy soğan, sous',price:14,badge:'pop',img:''},
  {id:11,cat:'əsas',emoji:'🥩',name:'Lülə kebab',desc:'Qoyun ətindən, odda bişirilmiş',price:16,badge:'',img:''},
  {id:12,cat:'əsas',emoji:'🍚',name:'Şah plov',desc:'Ərli düyü, ərik, kişmiş, əfdək',price:18,badge:'hot',img:''},
  {id:13,cat:'əsas',emoji:'🫕',name:'Güveç',desc:'Tərəvəzli ət, saxsı qabda bişirilmiş',price:15,badge:'',img:''},
  {id:14,cat:'əsas',emoji:'🐟',name:'Qızardılmış balıq',desc:'Limon, göyərti, kartof garnitürü',price:20,badge:'new',img:''},
  {id:15,cat:'əsas',emoji:'🍖',name:'Qovurma',desc:'Ənənəvi Azərbaycan ət yemeyi',price:17,badge:'',img:''},
  {id:16,cat:'əsas',emoji:'🫔',name:'Döner',desc:'Toyuq, tərəvəz, xüsusi sous',price:10,badge:'pop',img:''},
  {id:17,cat:'əsas',emoji:'🧆',name:'Küftə bozbаş',desc:'Ət köftəsi, noxud şorbası',price:13,badge:'',img:''},
  {id:18,cat:'əsas',emoji:'🥘',name:'Lavangi',desc:'Doldurulmuş toyuq, qoz içi ilə',price:22,badge:'hot',img:''},
  // İçkilər
  {id:19,cat:'içki',emoji:'☕',name:'Espresso',desc:'İtalyan qovurması, ikiqat',price:3,badge:'',img:''},
  {id:20,cat:'içki',emoji:'🥛',name:'Cappuccino',desc:'Süd köpüyü, kakao',price:5,badge:'',img:''},
  {id:21,cat:'içki',emoji:'🧃',name:'Təzə portağal şirəsi',desc:'100% təzə sıxılmış',price:5,badge:'new',img:''},
  {id:22,cat:'içki',emoji:'🍵',name:'Çay (demlikcə)',desc:'Azərbaycan qara çayı',price:2.5,badge:'pop',img:''},
  {id:23,cat:'içki',emoji:'🥤',name:'Limonад',desc:'Limon, nanə, qaz suyu',price:4,badge:'',img:''},
  // Desertlər
  {id:24,cat:'desert',emoji:'🍰',name:'Şokoladlı tort',desc:'Qaynar şokolad sousu ilə',price:7,badge:'new',img:''},
  {id:25,cat:'desert',emoji:'🍮',name:'Baklava',desc:'Ev bişirməsi, qoz içi, bal',price:6,badge:'pop',img:''},
  {id:26,cat:'desert',emoji:'🍦',name:'Dondurma üçlüyü',desc:'Vanil, şokolad, fıstıq',price:8,badge:'',img:''},
  {id:27,cat:'desert',emoji:'🧁',name:'Şəkər bürməsi',desc:'Ənənəvi Azərbaycan şirnisi',price:5,badge:'',img:''},
  {id:28,cat:'desert',emoji:'🍩',name:'Çak-çak',desc:'Bal, qoz ilə bişirilmiş',price:5,badge:'',img:''},
];

const catMeta = {
  sehər:     {label:'Səhər yeməyi',   icon:'🌅'},
  soupSalad: {label:'Şorba & Salat', icon:'🥗'},
  əsas:      {label:'Əsas yeməklər', icon:'🍖'},
  içki:      {label:'İçkilər',        icon:'☕'},
  desert:    {label:'Desertlər',      icon:'🍰'},
};
const catOrder = ['sehər','soupSalad','əsas','içki','desert'];

let currentCat = 'all';
let nextId = 29;

// ── RENDER MENU ──
function render() {
  const root = document.getElementById('menu-root');
  const list = currentCat === 'all' ? menuData : menuData.filter(i => i.cat === currentCat);
  const grouped = {};
  catOrder.forEach(c => grouped[c] = []);
  list.forEach(i => { if (grouped[i.cat]) grouped[i.cat].push(i); });

  let html = '';
  catOrder.forEach(cat => {
    const items = grouped[cat];
    if (!items || !items.length) return;
    html += `<div class="section-wrap">
      <div class="section-head">
        <h2>${catMeta[cat].icon} ${catMeta[cat].label}</h2>
        <div class="section-line"></div>
      </div>
      <div class="items">`;
    items.forEach(item => {
      const badge = item.badge === 'pop' ? '<span class="badge badge-pop">Populyar</span>' :
                    item.badge === 'new' ? '<span class="badge badge-new">Yeni</span>' :
                    item.badge === 'hot' ? '<span class="badge badge-hot">Xüsusi</span>' : '';
      const imgEl = item.img
        ? `<img class="item-img" src="${item.img}" alt="${item.name}">`
        : `<div class="item-img-placeholder">${item.emoji}</div>`;
      html += `<div class="item">
        ${imgEl}
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-right">
          ${badge}
          <div class="item-price">${item.price} ₼</div>
        </div>
      </div>`;
    });
    html += `</div><div class="divider"></div></div>`;
  });
  root.innerHTML = html;
  renderEditList();
}

// ── FILTER ──
function filter(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── HERO UPDATE ──
function updateHero() {
  document.getElementById('rest-name-display').textContent = document.getElementById('r-name').value;
  document.getElementById('rest-addr-display').textContent = document.getElementById('r-addr').value;
  document.getElementById('rest-phone-display').textContent = document.getElementById('r-phone').value;
  document.getElementById('rest-hours-display').textContent = document.getElementById('r-hours').value;
}

// ── LOGO CHANGE ──
function changeLogo(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('logo-img');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('logo-emoji').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

// ── IMAGE PREVIEW ──
function previewImg(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('img-preview');
    prev.src = e.target.result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

// ── ADD ITEM ──
function addItem() {
  const name  = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const desc  = document.getElementById('f-desc').value.trim();
  const cat   = document.getElementById('f-cat').value;
  const badge = document.getElementById('f-badge').value;
  const prev  = document.getElementById('img-preview');
  const img   = (prev.style.display === 'block') ? prev.src : '';

  if (!name || !price) { showToast('Ad və qiymət daxil edin!'); return; }

  menuData.push({ id: nextId++, cat, emoji: '🍽', name, desc, price, badge, img });
  render();
  // reset form
  ['f-name','f-price','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-badge').value = '';
  prev.style.display = 'none';
  document.getElementById('f-img').value = '';
  showToast('Yemək əlavə edildi!');
}

// ── EDIT LIST (admin) ──
function renderEditList() {
  const el = document.getElementById('edit-list');
  if (!el) return;
  let html = '';
  menuData.forEach(item => {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ebe0">
      <span style="font-size:20px">${item.img ? '🖼' : item.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name}</div>
        <div style="font-size:11px;color:#999">${catMeta[item.cat]?.label} — ${item.price} ₼</div>
      </div>
      <button onclick="deleteItem(${item.id})" style="flex-shrink:0;padding:4px 10px;border-radius:8px;font-size:12px;border:1px solid #fce4ec;background:#fff8f8;color:#c62828;cursor:pointer;font-family:inherit">Sil</button>
    </div>`;
  });
  el.innerHTML = html || '<p style="font-size:13px;color:#aaa">Hələ yemək yoxdur</p>';
}

function deleteItem(id) {
  menuData = menuData.filter(i => i.id !== id);
  render();
  showToast('Silindi');
}

// ── ADMIN TOGGLE ──
function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  p.classList.toggle('open');
  renderEditList();
}

// ── QR CODE ──
function buildQR() {
  const url = window.location.href.split('?')[0];
  document.getElementById('qr-url-text').textContent = url;
  try {
    new QRCode(document.getElementById('qr-box'), {
      text: url, width: 160, height: 160,
      colorDark: '#1a1205', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {}
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('Link kopyalandı!'));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
render();
buildQR();
</script>
</body>
</html>
